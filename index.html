<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSC 27</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/png" href="icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #d946ef;
            --accent: #06b6d4;
            --bg-dark: #020617;
            --card-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --neon-glow: 0 0 15px rgba(139, 92, 246, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', 'Hind Siliguri', sans-serif; }
        
        body {
            background: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container { max-width: 1000px; margin: 0 auto; position: relative; }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 30px; 
            background: rgba(15, 23, 42, 0.8); 
            border-radius: 24px;
            border: 1px solid var(--glass-border); 
            margin-bottom: 40px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo { font-size: 1.6rem; font-weight: 800; color: #fff; letter-spacing: 2px; text-transform: uppercase; }
        .logo span { color: var(--accent); text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); }

        .hidden { display: none !important; }
        
        .btn-back {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border);
            color: #cbd5e1; padding: 10px 22px; border-radius: 14px;
            cursor: pointer; margin-bottom: 25px; transition: 0.4s; font-size: 0.9rem;
            font-weight: 500;
        }
        .btn-back:hover { 
            background: var(--primary); color: #fff; 
            box-shadow: var(--neon-glow);
            transform: translateX(-5px);
        }

        .grid-layout {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px; animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .card {
            background: var(--card-bg); 
            border: 1px solid var(--glass-border);
            padding: 50px 20px; border-radius: 30px; text-align: center;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: translateX(-100%); transition: 0.6s;
        }
        .card:hover::before { transform: translateX(100%); }
        .card:hover { 
            transform: translateY(-10px) scale(1.02); 
            background: rgba(30, 41, 59, 0.8);
            border-color: var(--primary); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), var(--neon-glow);
        }
        .card h3 { font-size: 1.4rem; letter-spacing: 1px; }

        .list-item {
            background: var(--card-bg); padding: 20px 28px; border-radius: 20px;
            margin-bottom: 15px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; border: 1px solid var(--glass-border);
            transition: 0.3s ease;
        }
        .list-item:hover { 
            background: rgba(255,255,255,0.08); 
            border-color: var(--accent);
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .play-icon { color: var(--accent); font-weight: 600; font-size: 0.9rem; }

        /* Custom Video Player Styles */
        .custom-video-container {
            position: relative;
            background: #000;
            border-radius: 32px;
            overflow: hidden;
            aspect-ratio: 16/9;
            margin-bottom: 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
        }
        
        #yt-player {
            width: 100%;
            height: 100%;
            pointer-events: none; /* Prevents clicking through to YouTube */
        }

        /* Overlay to block direct interaction with iframe */
        .video-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 60px;
            z-index: 10;
            cursor: pointer;
        }

        .custom-controls {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 20;
            border-top: 1px solid var(--glass-border);
            opacity: 0;
            transition: opacity 0.3s;
        }

        
.custom-video-container .custom-controls {
    opacity: 0;
    transition: opacity 0.5s ease;
}

.custom-video-container.show-controls .custom-controls {
    opacity: 1;
}

        .control-btn {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            padding: 5px;
        }
        .control-btn:hover { color: var(--accent); }
        .control-btn svg { width: 22px; height: 22px; fill: currentColor; }

        .progress-container {
            flex-grow: 1;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            cursor: pointer;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            background: var(--primary);
            border-radius: 5px;
            width: 0%;
            position: relative;
        }
        .progress-bar::after {
            content: '';
            position: absolute;
            right: -5px;
            top: -4px;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
        }

        .time-display { font-size: 0.8rem; color: #cbd5e1; font-family: 'Poppins', sans-serif; min-width: 90px; text-align: center; }

        .volume-container { display: flex; align-items: center; gap: 5px; }
        .volume-slider {
            width: 60px; height: 4px;
            -webkit-appearance: none; background: rgba(255,255,255,0.2);
            border-radius: 5px; cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px;
            background: var(--accent); border-radius: 50%;
        }

        .speed-select {
            background: transparent; border: 1px solid var(--glass-border);
            color: #fff; padding: 2px 5px; border-radius: 5px; cursor: pointer;
            font-size: 0.8rem; outline: none;
        }
        .speed-select option { background: var(--bg-dark); }

        .video-meta {
            background: var(--card-bg); padding: 30px; border-radius: 30px;
            border: 1px solid var(--glass-border); backdrop-filter: blur(10px);
        }

        .mat-box {
            display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap;
        }
        .action-btn {
            padding: 14px 28px; border-radius: 16px; text-decoration: none;
            font-weight: 600; font-size: 0.95rem; transition: 0.4s; 
            display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-slide { background: var(--accent); color: #020617; }
        .btn-sheet { background: var(--primary); color: #fff; }
        .action-btn:hover { 
            opacity: 1; transform: translateY(-3px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        



/* ইনপুট বক্স থেকে আপ-ডাউন অ্যারো বাটন সরানোর জন্য */
input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}
input[type=number] {
    -moz-appearance: textfield; /* ফায়ারফক্সের জন্য */
}

/* সংখ্যার সাথে 'x' গ্যাপহীনভাবে বসানোর জন্য */
.speed-wrapper {
    position: relative;
    display: inline-flex;
    align-items: center;
}

.speed-select {
    padding-right: 12px !important; /* ডানে একটু জায়গা রাখা যাতে 'x' বসানো যায় */
    width: 45px !important;
    text-align: center;
}

.speed-wrapper::after {
    content: 'x';
    position: absolute;
    right: 4px; /* সংখ্যার একদম গা ঘেঁষে থাকার জন্য এই মানটি প্রয়োজন অনুযায়ী সামান্য পরিবর্তন করতে পারেন */
    color: #cbd5e1;
    pointer-events: none;
    font-size: 0.85rem;
}

        h2 { font-weight: 700; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(40px); filter: blur(10px); } 
            to { opacity: 1; transform: translateY(0); filter: blur(0); } 
        }
        /* মোবাইলের জন্য কন্ট্রোল বার অ্যাডজাস্টমেন্ট */
@media (max-width: 600px) {
    .custom-controls {
        gap: 8px;
        padding: 5px 10px;
    }
    .time-display { min-width: 60px; font-size: 0.7rem; }
    .volume-container { display: none; } /* মোবাইলে ভলিউম স্লাইডার জায়গা কম নেয় তাই হাইড */
    .speed-select { font-size: 0.7rem; }
}

/* অটো-হাইড ট্রানজিশন */
.custom-controls {
    opacity: 0;
    transition: opacity 0.5s ease;
}
.custom-controls.active {
    opacity: 1;
}

        ::-webkit-scrollbar { width: 8px; }

        #time-preview {

    font-size: 12px;

}

// কিবোর্ড শর্টকাট বন্ধ করা (F12, Ctrl+Shift+I, Ctrl+U)
document.onkeydown = function(e) {
  if(event.keyCode == 123) return false; // F12
  if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
  if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
  if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
  if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
}

    function navTo(id, pushHistory = true) {
    ['subject-screen', 'chapter-screen', 'video-list-screen', 'player-screen'].forEach(s => 
        document.getElementById(s).classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    
    // ব্রাউজার হিস্ট্রিতে পুশ করা
    if (pushHistory) {
        window.history.pushState({ screen: id }, "", `#${id}`);
    }
    window.scrollTo(0,0);
}

    function stopAndNavTo(id) {
    if(player && player.pauseVideo) player.pauseVideo();
    
    // ভিডিও প্লেয়ার থেকে বের হওয়ার সময়ও ব্রাউজারের হিস্ট্রি আপডেটের জন্য 
    // navTo-তে 'true' পাঠাতে হবে।
    navTo(id, true); 
}

    function openSubject(sub) {
        const list = document.getElementById('chapter-list');
        document.getElementById('sub-title').innerText = sub;
        list.innerHTML = '';
        const chaps = database[sub] || [];
        chaps.forEach(ch => {
            const d = document.createElement('div');
            d.className = 'list-item';
            d.onclick = () => openVideoList(ch);
            d.innerHTML = `<span>${ch.chapter}</span> <span class="play-icon">${ch.videos.length} Classes</span>`;
            list.appendChild(d);
        });
        navTo('chapter-screen');
    }

    function openVideoList(chObj) {
        const vContainer = document.getElementById('video-list-container');
        const mContainer = document.getElementById('chap-materials');
        document.getElementById('chap-title').innerText = chObj.chapter;
        vContainer.innerHTML = '';
        
        chObj.videos.forEach((v, i) => {
            const d = document.createElement('div');
            d.className = 'list-item';
            d.onclick = () => playNow(v);
            d.innerHTML = `<span>Class ${i+1}: ${v.title}</span> <span class="play-icon">▶ Watch Now</span>`;
            vContainer.appendChild(d);
        });

        mContainer.innerHTML = `<a href="${chObj.practiceSheets[0]}" class="action-btn btn-sheet">📥 ডাউনলোড প্র্যাকটিস শিট (.pdf)</a>`;
        navTo('video-list-screen');
    }

    // --- Custom Video Player Logic --- //
   let player;
let timeUpdater;
let showRemaining = false;

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            height: '100%',
            width: '100%',
            playerVars: {
                'autoplay': 1,
                'controls': 0, // Hides default controls
                'disablekb': 1, // Disable keyboard shortcuts
                'fs': 0, // Disable default fullscreen
                'rel': 0, // Don't show related videos
                'modestbranding': 1, // Minimize YouTube logo
                'playsinline': 1,
                'iv_load_policy': 3 // Hide annotations
            },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange
            }
        });
    }
function onPlayerReady(event) {
    // Overlay Click = Play/Pause
    document.getElementById('video-overlay').addEventListener('click', (e) => {
        if(!isDragging) togglePlay();
    });
    
    // Play/Pause Button
    document.getElementById('play-pause-btn').addEventListener('click', togglePlay);
    
    // Volume Slider
    const volumeSlider = document.getElementById('volume-slider');
    const volumeDisplay = document.getElementById('volume-display');

    volumeSlider.addEventListener('input', (e) => {
        let vol = e.target.value;
        player.setVolume(vol);
        if(volumeDisplay) {
            volumeDisplay.innerText = vol + "%";
        }
        
        if(vol > 0) player.unMute();
        else player.mute();
    });

    // Mute Button
    document.getElementById('mute-btn').addEventListener('click', () => {
        if(player.isMuted()) {
            player.unMute();
            document.getElementById('volume-slider').value = player.getVolume();
        } else {
            player.mute();
            document.getElementById('volume-slider').value = 0;
        }
    });

    // স্পিড কন্ট্রোল লজিক
document.getElementById('speed-input').addEventListener('input', (e) => {
    let speed = parseFloat(e.target.value);
    
    // ইউটিউব প্লেয়ারের সর্বোচ্চ সীমা ২.০, তাই এখানে ২.০ এর বেশি দেওয়া যাবে না
    if(speed >= 0.25 && speed <= 2.0) {
        player.setPlaybackRate(speed);
    } else if (speed > 2.0) {
        // যদি কেউ ভুল করে ২ এর বেশি লেখে, তাকে ২ এ ফিরিয়ে আনা
        e.target.value = 2.0;
        player.setPlaybackRate(2.0);
    }
});

    // --- ড্র্যাগিং লজিক (পিসি ও মোবাইল) ---
    const progressContainer = document.getElementById('progress-container');
    const timePreview = document.getElementById('time-preview');
    let isDragging = false;

    const handleMove = (e) => {
        if (!isDragging) return;
        
        // টাচ ইভেন্ট নাকি মাউস ইভেন্ট তা চেক করা
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        
        const rect = progressContainer.getBoundingClientRect();
        let pos = (clientX - rect.left) / rect.width;
        pos = Math.max(0, Math.min(1, pos));
        
        // নীল বার ও প্রিভিউ আপডেট
        document.getElementById('progress-bar').style.width = `${pos * 100}%`;
        const time = pos * player.getDuration();
        timePreview.innerText = formatTime(time);
        timePreview.style.left = `${pos * 100}%`;
        timePreview.style.display = 'block';

        // ভিডিও সিক করা
        player.seekTo(time, true);
    };

    const startDrag = (e) => {
        isDragging = true;
        handleMove(e);
    };

    const stopDrag = () => {
        isDragging = false;
        timePreview.style.display = 'none';
    };

    // মাউস ইভেন্ট
    progressContainer.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', stopDrag);

    // টাচ ইভেন্ট (মোবাইলের জন্য)
    progressContainer.addEventListener('touchstart', (e) => {
        isDragging = true;
        handleMove(e);
    });
    window.addEventListener('touchmove', handleMove, { passive: true });
    window.addEventListener('touchend', stopDrag);

    // Fullscreen Toggle
    document.getElementById('fullscreen-btn').addEventListener('click', toggleFullScreen);
}

    function onPlayerStateChange(event) {
    const playIcon = document.getElementById('play-icon');
    const pauseIcon = document.getElementById('pause-icon');
    
    if (event.data == YT.PlayerState.PLAYING) {
        playIcon.classList.add('hidden');
        pauseIcon.classList.remove('hidden');
        timeUpdater = setInterval(updateProgress, 500);
        document.getElementById('duration').innerText = formatTime(player.getDuration());

        // অটো ফুলস্ক্রিন লজিক
        if (shouldAutoFullscreen) {
            toggleFullScreen(); // ফুলস্ক্রিন ফাংশন কল করুন
            shouldAutoFullscreen = false; // একবার হওয়ার পর এটি রিসেট করে দিন যাতে বারবার না হয়
        }
    } else {
        playIcon.classList.remove('hidden');
        pauseIcon.classList.add('hidden');
        clearInterval(timeUpdater);
    }
}

    function togglePlay() {
        if (player.getPlayerState() == YT.PlayerState.PLAYING) {
            player.pauseVideo();
        } else {
            player.playVideo();
        }
    }

   function updateProgress() {
    const current = player.getCurrentTime();
    const duration = player.getDuration();
    const percentage = (current / duration) * 100;
    
    document.getElementById('progress-bar').style.width = `${percentage}%`;
    document.getElementById('current-time').innerText = formatTime(current);

    // ডিউরেশন দেখার লজিক
    const durationSpan = document.getElementById('duration');
    if (showRemaining) {
        const remaining = duration - current;
        durationSpan.innerText = "-" + formatTime(remaining); // বাকি সময় দেখাবে
    } else {
        durationSpan.innerText = formatTime(duration); // টোটাল টাইম দেখাবে
    }
}

    // --- Updated Time Formatting Logic --- //
    function formatTime(seconds) {
        if (!seconds) return "0:00";
        seconds = Math.floor(seconds);
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = Math.floor(seconds % 60);
        
        if (h > 0) {
            return `${h}:${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
        }
        return `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    function toggleFullScreen() {
        const container = document.getElementById('video-container');
        if (!document.fullscreenElement) {
            if (container.requestFullscreen) { container.requestFullscreen(); }
            else if (container.webkitRequestFullscreen) { container.webkitRequestFullscreen(); }
        } else {
            if (document.exitFullscreen) { document.exitFullscreen(); }
            else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
        }
    }

   let shouldAutoFullscreen = false; // এটি গ্লোবাল ডিক্লেয়ার করুন

function playNow(video) {
    const defaultVideoId = 'eztiE0DHtr0'; 
    const targetVideoId = 'eztiE0DHtr0'; 
    let finalId = (video.id === 'ID_HERE' || !video.id || video.id === '#') ? defaultVideoId : video.id;

    if(player && player.loadVideoById) {
        player.loadVideoById({ 'videoId': finalId, 'suggestedQuality': 'hd1080' });
    }
    
    document.getElementById('vid-title').innerText = video.title;
    document.getElementById('individual-slide').href = video.slide;
    navTo('player-screen');

    // ভিডিও লোড হওয়ার ঠিক পর পরই ফুল স্ক্রিন ট্রিগার
    if (finalId === targetVideoId) {
        setTimeout(toggleFullScreen, 500); // ৫০০ মিলিসেকেন্ড দেরিতে যাতে প্লেয়ার রেডি হতে পারে
    }
}
    // কন্ট্রোল অটো-হাইড লজিক
// কন্ট্রোল অটো-হাইড লজিক
let controlTimeout;
const container = document.getElementById('video-container');
const controls = document.getElementById('controls');

function showControls() {
    container.classList.add('show-controls'); // CSS ক্লাস যোগ করা
    clearTimeout(controlTimeout);
    
    // ৪ সেকেন্ড পর কন্ট্রোলবার হাইড হবে
    controlTimeout = setTimeout(() => {
        if (player && player.getPlayerState() === YT.PlayerState.PLAYING) {
            container.classList.remove('show-controls');
        }
    }, 4000);
}
function toggleDurationView() {
    showRemaining = !showRemaining;
    updateProgress(); // ক্লিক করার সাথে সাথে ভিউ আপডেট করার জন্য
}

// ইভেন্ট লিসেনারসমূহ
container.addEventListener('mousemove', showControls);
container.addEventListener('touchstart', showControls);
container.addEventListener('click', showControls); // মোবাইলের জন্য সরাসরি ক্লিকে কন্ট্রোল দেখানো

// কন্ট্রোলের উপর মাউস থাকলে অটো-হাইড থামিয়ে রাখা
controls.addEventListener('mouseenter', () => clearTimeout(controlTimeout));
controls.addEventListener('mouseleave', () => showControls());
window.addEventListener('popstate', (event) => {
    // ১. প্রথমে প্লেয়ারটি থামান (যদি প্লেয়ার অবজেক্ট থাকে)
    if (typeof player !== 'undefined' && player.pauseVideo) {
        player.pauseVideo();
    }

    // ২. তারপর স্ক্রিন পরিবর্তনের লজিক
    if (event.state && event.state.screen) {
        navTo(event.state.screen, false);
    } else {
        navTo('subject-screen', false);
    }
});
window.history.replaceState({ screen: 'subject-screen' }, "", "#subject-screen");


</script>
